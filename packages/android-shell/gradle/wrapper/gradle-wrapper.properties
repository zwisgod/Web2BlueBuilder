# gradle-wrapper.properties — Gradle Wrapper 配置
#
# distributionUrl：指定 Gradle 发行版下载地址。
#   - 首次运行 gradlew 时，若本地缓存（~/.gradle/wrapper/dists）中没有对应版本，
#     会自动从此 URL 下载（需要网络）。
#   - 下载完成后永久缓存，后续构建无需重复下载。
#
# Gradle 8.4 与 AGP 8.2.0 的版本兼容矩阵：
#   AGP 8.2.x → 要求 Gradle 8.2+（推荐 8.4）
#   JDK：Gradle 8.4 需要 JDK 17+
#
# 若要升级 Gradle 版本，只需修改 distributionUrl 中的版本号即可。

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists

# 使用 -bin 版本（仅包含二进制，不含文档和源码，下载更快）
# 若需要在 IDE 中查看 Gradle 源码，可改为 -all 版本
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip

zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
